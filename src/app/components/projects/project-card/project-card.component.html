<article class="project-card card-base">
  <div class="project-image">
    <img [src]="project().image" [alt]="project().title" loading="lazy" appLazyImage />
    <div class="project-overlay">
      <a [href]="project().githubUrl" target="_blank" rel="noopener noreferrer" aria-label="View on GitHub">
        <i class="fa-brands fa-github" aria-hidden="true"></i>
      </a>
      <a [href]="project().liveUrl" target="_blank" rel="noopener noreferrer" aria-label="View live demo">
        <i class="fa-solid fa-arrow-up-right-from-square" aria-hidden="true"></i>
      </a>
    </div>
    <span class="project-status" [class]="project().status.toLowerCase().replace(' ', '-')">
      {{ project().status }}
    </span>
  </div>
  <div class="project-body">
    <span class="project-category">{{ project().category }}</span>
    <h3>{{ project().title }}</h3>
    <p>{{ project().description }}</p>
    <div class="project-tech">
      @for (tech of project().technologies; track tech) {
        <span class="tech-tag">{{ tech }}</span>
      }
    </div>
    <div class="project-actions">
      <a [href]="project().githubUrl" target="_blank" rel="noopener noreferrer" class="btn-github">
        <i class="fa-brands fa-github" aria-hidden="true"></i> GitHub
      </a>
      <a [href]="project().liveUrl" target="_blank" rel="noopener noreferrer" class="btn-demo">
        <i class="fa-solid fa-external-link" aria-hidden="true"></i> Live Demo
      </a>
    </div>
  </div>
</article>
